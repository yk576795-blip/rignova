version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rignova-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rignova
      POSTGRES_PASSWORD: rignova_secret
      POSTGRES_DB: rignova
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rignova -d rignova"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rignova-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rignova-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://rignova:rignova_secret@postgres:5432/rignova?schema=public
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
